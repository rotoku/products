spring.application.name=products
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:products;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:sa}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.format_sql=true
spring.jpa.properties.dialect=org.hibernate.dialect.H2Dialect

# Expor somente endpoints info e metrics
management.endpoints.web.exposure.include=info,metrics

# Garantir endpoints ligados
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true

# Exportação de métricas: desliga tudo e liga só JVM
management.metrics.enable.all=false
management.metrics.enable.jvm=true

# Seu export OTLP (se já estiver usando)
management.otlp.metrics.export.url=http://otel-collector:4318/v1/metrics
management.otlp.metrics.export.step=10s
management.otlp.tracing.endpoint=http://otel-collector:4318/v1/traces
management.tracing.sampling.probability=1.0
